  [[params.parcours]]
    type = 'education'
    title = 'Diplôme d’Ingénieur d’État en Informatique'
    org = 'Institut National des Postes et Télécommunications (INPT)'
    date = '2023 - Présent'
    desc = 'Compétences clés : Algorithmes & Structures de données, Programmation Orientée Objet, Développement Backend & Frontend, Bases de données, Big Data, DevOps, CI/CD, Docker, Méthodes Agiles, IoT, Power BI, ERP Dynamics 365.'

  [[params.parcours]]
    type = 'education'
    title = 'CPGE - Math et Physique et Informatique'
    org = 'Prepa Scientifique'
    date = '2021 - 2023'
    desc = 'Classement : 15ème.'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.highlight]
    noClasses = true
    style = 'nord'
    lineNos = false
    tabWidth = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"]]
