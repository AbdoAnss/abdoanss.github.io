<a href="#main-content" class="skip-to-content">{{ i18n "skip_to_content" }}</a>
<div class="container">
  <header class="site-header">
    <div class="site-header-row">
      <a href="{{ .Site.Home.RelPermalink }}" class="site-name">{{ .Site.Title }} <span aria-hidden="true">//</span></a>
      <div class="site-nav-right">
        {{- $section := "" -}}
        {{- with .CurrentSection -}}{{ $section = .Type }}{{- end -}}
        <a href="/blog/" class="nav-link{{ if eq $section "blog" }} nav-active{{ end }}"><span>01</span> {{ i18n "nav_blog" }}</a>
        <a href="/projects/" class="nav-link{{ if eq $section "projects" }} nav-active{{ end }}"><span>02</span> {{ i18n "nav_projects" }}</a>
        <a href="/tools/" class="nav-link{{ if eq $section "tools" }} nav-active{{ end }}"><span>03</span> {{ i18n "nav_tools" }}</a>
        <a href="/about/" class="nav-link{{ if eq .RelPermalink "/about/" }} nav-active{{ end }}"><span>04</span> {{ i18n "nav_about" }}</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="{{ i18n "theme_toggle" }}">
          {{ partial "icons.html" "sun" }}
          {{ partial "icons.html" "moon" }}
        </button>
      </div>
    </div>
  </header>
